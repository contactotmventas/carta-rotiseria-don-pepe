<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Don Pepe — Carta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --azul:#2E5A86; --azulo:#1E3F61; --tinta:#3a3a38; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{
    font-family:'Montserrat',system-ui,sans-serif;
    color:var(--tinta);
    background:#dedbd4;
    min-height:100vh;
    padding-bottom:30px;
  }
  .wrap{ max-width:560px; margin:0 auto; padding:0 22px; }

  header.hero{ text-align:center; padding:30px 0 10px; }
  .marca{
    width:96px;height:96px;border-radius:50%;margin:0 auto 14px;
    background:radial-gradient(circle at 35% 30%, #2BC9DE, #B429C9 88%);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 22px rgba(30,63,97,.28);
  }
  .marca b{ font-family:'Montserrat';font-weight:800;color:#fff;font-size:42px;letter-spacing:-2px; }
  .marca-img{ width:100%;height:100%;border-radius:50%;object-fit:cover; }
  .hero h1{
    font-family:'Caveat',cursive;font-weight:700;color:var(--azul);
    font-size:46px;line-height:.9;
  }
  .hero p{ color:var(--azulo);opacity:.7;font-size:13px;margin-top:6px;letter-spacing:.5px; }

  /* Próximos eventos */
  .eventos{
    margin:6px 18px 18px;
    padding:18px 16px;
    background:linear-gradient(135deg, rgba(43,201,222,.12), rgba(180,41,201,.10));
    border:1.5px solid rgba(46,90,134,.25);
    border-radius:16px;
  }
  .ev-cabecera{
    text-align:center;font-family:'Caveat',cursive;font-weight:700;
    color:var(--azul);font-size:28px;margin-bottom:12px;line-height:1;
  }
  .ev-item{
    padding:10px 0;
    border-top:1px dashed rgba(46,90,134,.25);
  }
  .ev-item:first-of-type{ border-top:none; }
  .ev-fecha{
    font-family:'Montserrat';font-weight:700;font-size:12px;
    color:#B429C9;text-transform:capitalize;letter-spacing:.3px;
  }
  .ev-titulo{
    font-family:'Caveat',cursive;font-weight:700;
    color:var(--azul);font-size:24px;line-height:1.05;margin-top:1px;
  }
  .ev-detalle{ font-size:14px;color:var(--azulo);opacity:.8;margin-top:2px; }

  nav.chips{
    position:sticky;top:0;z-index:10;
    display:flex;gap:8px;overflow-x:auto;padding:12px 22px;
    background:rgba(222,219,212,.92);backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(46,90,134,.18);
    scrollbar-width:none;
  }
  nav.chips::-webkit-scrollbar{ display:none; }
  .navchip{
    white-space:nowrap;border:1.5px solid var(--azul);background:transparent;
    color:var(--azul);font-weight:600;font-size:13px;padding:7px 15px;border-radius:999px;
    cursor:pointer;text-transform:capitalize;
  }
  .navchip:active{ background:var(--azul);color:#fff; }

  .pagina{ padding:26px 0 8px; scroll-margin-top:64px; }
  .titulo{
    font-family:'Caveat',cursive;font-weight:700;color:var(--azul);
    font-size:42px;line-height:1;margin-bottom:6px;
  }
  .titulo .punto{ color:var(--azul); }
  .sub{
    font-family:'Montserrat';font-weight:800;color:var(--azulo);
    font-size:17px;letter-spacing:1px;margin:20px 0 4px;
    display:inline-block;
  }
  .sub::after{
    content:"";display:block;height:3px;width:100%;margin-top:3px;
    background:var(--azul);border-radius:2px;opacity:.85;
  }
  .nota{
    color:var(--azulo);opacity:.78;font-size:12.5px;font-style:italic;
    margin:2px 0 8px;line-height:1.4;
  }
  .filas{ margin-top:6px; }
  .fila{ display:flex;align-items:flex-end;gap:6px;padding:5px 0; }
  .fnom{ display:flex;flex-direction:column;min-width:0;flex:0 1 auto; }
  .nom{ font-weight:700;font-size:14.5px;color:var(--tinta);text-transform:uppercase;letter-spacing:.2px;line-height:1.15; }
  .desc{ font-weight:400;font-size:12px;color:#6a6a66;text-transform:none;letter-spacing:0;margin-top:1px; }
  .dots{ flex:1;border-bottom:2px dotted rgba(46,90,134,.5);transform:translateY(-4px);min-width:18px; }
  .precio{ font-weight:800;font-size:15px;color:var(--azul);white-space:nowrap; }
  .fila.agotado .nom{ color:#a99;text-decoration:line-through; }
  .fila.agotado .precio{ color:#bbb; }
  .ag{ font-size:10px;background:#C0455A;color:#fff;padding:1px 6px;border-radius:6px;vertical-align:middle;text-decoration:none;display:inline-block;letter-spacing:.5px; }

  .ig{ text-align:center;font-family:'Caveat',cursive;font-size:22px;color:var(--azul);opacity:.8;padding:24px 0 6px; }

  @media (prefers-reduced-motion: no-preference){
    .pagina{ animation:sube .5s both; }
    @keyframes sube{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  }

  /* ---- Portada con los 3 botones ---- */
  .portada{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:30px;
    background:linear-gradient(160deg,#1E3F61 0%,#2E5A86 45%,#B429C9 100%);
    background-size:cover; background-position:center;
  }
  .portada-cap{
    background:rgba(15,25,40,.42); backdrop-filter:blur(3px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:26px; padding:40px 28px; max-width:430px; width:100%;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
  }
  .port-tit{ font-family:'Montserrat';font-weight:800;color:#fff;font-size:30px;letter-spacing:-1px;margin-top:10px;line-height:1.1; }
  .port-sub{ color:rgba(255,255,255,.82);font-size:12px;letter-spacing:4px;margin-bottom:30px; }
  .port-botones{ display:flex;flex-direction:column;gap:14px; }
  .port-btn{
    font-family:'Montserrat';font-weight:700;font-size:18px;
    padding:18px 16px;border:none;border-radius:16px;cursor:pointer;
    background:#fff;color:#1E3F61;
    box-shadow:0 6px 20px rgba(0,0,0,.28);
    display:flex;align-items:center;justify-content:center;gap:10px;
    transition:transform .12s ease;
  }
  .port-btn:active{ transform:scale(.96); }
  .port-btn span{ font-size:22px; }
  .volver{
    position:sticky;top:0;z-index:20;width:100%;display:block;
    background:var(--azulo);color:#fff;border:none;padding:13px;
    font-family:'Montserrat';font-weight:600;font-size:14px;cursor:pointer;letter-spacing:.3px;
  }
  .volver:active{ filter:brightness(1.15); }
  .marca.chica{ width:62px;height:62px;margin-bottom:10px; }
  .marca.chica b{ font-size:27px; }

  /* ---- Carta del Bar: fotos oficiales ---- */
  .fotos-wrap{ max-width:560px; margin:0 auto; background:#ece7dd; }
  .foto-carta{ display:block; width:100%; height:auto; }
</style>
</head>
